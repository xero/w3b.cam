name: untag

# Removes a tag from a cam, stream, or feed entry in the unified `tags` table,
# persists the updated DB to the db-store release, then rebuilds & deploys the site.
on:
  workflow_dispatch:
    inputs:
      kind:
        description: What to untag
        required: true
        type: choice
        options:
          - cam
          - stream
          - feed
      ref:
        description: IP address (cam), YouTube video id (stream), or cam id (feed)
        required: true
        type: string
      tag:
        description: Tag name to remove (normalized to lowercase)
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  untag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # kind/ref/tag passed via env (not inline ${{ }}) to avoid shell injection.
      # The script validates all three and exits 1 on bad input.
      - name: Remove tag
        env:
          KIND: ${{ inputs.kind }}
          REF: ${{ inputs.ref }}
          TAG: ${{ inputs.tag }}
        run: bun run untag "$KIND" "$REF" "$TAG"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Tags render on detail pages, the tags cloud, and browse pages, so rebuild & deploy.
  call-build:
    needs: untag
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
