name: remove

# Removes an entry from the DB WITHOUT blacklisting it (a cam host by IP/hostname, a
# stream, or a feed cam), persists the updated DB to the db-store release, then rebuilds
# & deploys the site. A removed entry returns on the next re-ingest; use `blacklist` to
# keep a host out for good.
on:
  workflow_dispatch:
    inputs:
      kind:
        description: What kind of entry to remove
        required: true
        type: choice
        options:
          - cam
          - stream
          - feed
        default: cam
      target:
        description: "cam: IP (IPv4/IPv6) or hostname/domain · stream/feed: the stored id"
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  remove:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # Inputs passed via env (not inline ${{ }}) to avoid shell injection. The `--` keeps a
      # target that begins with '-' from being read as a flag. The script validates and exits 1.
      - name: Remove target
        env:
          KIND: ${{ inputs.kind }}
          TARGET: ${{ inputs.target }}
        run: bun run remove --kind "$KIND" -- "$TARGET"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Removing entries changes the gallery, so rebuild & deploy to drop them from the site.
  call-build:
    needs: remove
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
