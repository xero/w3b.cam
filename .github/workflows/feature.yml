name: feature

# Pins which cam/stream is showcased on the homepage (index.html) into one of two
# slots per kind, persists the updated DB to the db-store release, then rebuilds &
# deploys the site.
on:
  workflow_dispatch:
    inputs:
      kind:
        description: What to feature
        required: true
        type: choice
        options:
          - cam
          - stream
      slot:
        description: Homepage slot to set (1 or 2)
        required: true
        type: choice
        options:
          - "1"
          - "2"
      ref:
        description: IP address (cam) or YouTube video id (stream)
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # kind/slot/ref passed via env (not inline ${{ }}) to avoid shell injection.
      # The script validates all three and exits 1 on bad input.
      - name: Set featured
        env:
          KIND: ${{ inputs.kind }}
          SLOT: ${{ inputs.slot }}
          REF: ${{ inputs.ref }}
        run: bun run feature "$KIND" "$SLOT" "$REF"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Featuring changes the homepage, so rebuild & deploy to reflect it.
  call-build:
    needs: feature
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
