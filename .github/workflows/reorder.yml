name: reorder

# Pins which screenshot (ip:port) represents a host on its gallery card, persists
# the updated DB to the db-store release, then rebuilds & deploys the site.
on:
  workflow_dispatch:
    inputs:
      ip:
        description: IP address of the host (IPv4 or IPv6)
        required: true
        type: string
      port:
        description: Port whose screenshot to pin as the card image
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  reorder:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # ip/port passed via env (not inline ${{ }}) to avoid shell injection.
      # The script validates both and exits 1 on bad input (or an unknown host:port).
      - name: Pin screenshot
        env:
          IP: ${{ inputs.ip }}
          PORT: ${{ inputs.port }}
        run: bun run reorder "$IP" "$PORT"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Reordering changes a host's card image, so rebuild & deploy to reflect it.
  call-build:
    needs: reorder
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
