name: test

# Quality gate for pull requests and main: type-check, the unit + integration suite, then
# the built site driven by Playwright. Fully offline. The tests seed a throwaway DB and bake
# a fixture site, so there is no db-store restore and no secrets to configure.
# Make this a merge gate by adding the "test" check to main's branch protection rules.
on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a newer push cancels the older in-flight run.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Only needs to read the checkout.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # bake (used by the integration + e2e layers) guards on node_modules/htmx.org.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun typecheck

      # Throwaway DB_PATH / OUT_DIR so a stray default can never touch a real store.
      - name: Unit + integration
        run: DB_PATH="$(mktemp -d)/db.sqlite" OUT_DIR="$(mktemp -d)/out" bun run test

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: End-to-end
        run: bun run test:e2e

      # Keep the Playwright HTML report when e2e fails, for debugging the run.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
