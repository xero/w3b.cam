name: unblacklist

# Removes an IP or hostname from the blacklist and persists the updated DB to the
# db-store release. No rebuild: unblacklisting fetches no camera data, so the
# site is unchanged until the next scrape re-adds the host.
on:
  workflow_dispatch:
    inputs:
      target:
        description: IP (IPv4/IPv6) or hostname/domain to unblacklist
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  unblacklist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # Target passed via env (not inline ${{ }}) to avoid shell injection.
      # The script validates the input and exits 1 on bad input.
      - name: Unblacklist target
        env:
          TARGET: ${{ inputs.target }}
        run: bun run unblacklist "$TARGET"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber
