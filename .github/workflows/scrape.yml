name: scrape

# Runs the Shodan scraper on a schedule (and on demand), persists the updated
# SQLite DB to the db-store release, then rebuilds & deploys the site.
on:
  schedule:
    # Every 6 hours (UTC). Scraping spends Shodan query credits; the scraper
    # self-limits pages to the available credit balance.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: Number of Shodan result pages to fetch
        required: false
        default: '2'
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    # Neutral stop signal: the scraper sets this true only when a new camera or a
    # changed screenshot actually alters the baked site. A credits-out / nothing-new
    # run stays green but leaves it false, so call-build (below) skips.
    outputs:
      build_needed: ${{ steps.scrape.outputs.build_needed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cheap credit check first (getApiInfo spends nothing). If we're out of query
      # credits there's no point downloading the ~375MB DB or scraping, so gate the
      # heavy steps below on has_credits — the job still exits green (neutral stop).
      - name: Check Shodan credits
        id: preflight
        env:
          SHODANTOKEN: ${{ secrets.SHODANTOKEN }}
        run: bun run preflight

      - name: Restore DB from release store
        if: steps.preflight.outputs.has_credits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      - name: Scrape
        id: scrape
        if: steps.preflight.outputs.has_credits == 'true'
        env:
          SHODANTOKEN: ${{ secrets.SHODANTOKEN }}
          PAGES: ${{ inputs.pages || '2' }}
        run: bun run scrape --pages "$PAGES"

      - name: Save DB to release store
        if: steps.preflight.outputs.has_credits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Rebuild & deploy from the DB we just saved (build re-restores it from the store).
  # Skipped when the scrape changed nothing, so scheduled no-op runs don't redeploy.
  call-build:
    needs: scrape
    if: needs.scrape.outputs.build_needed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
