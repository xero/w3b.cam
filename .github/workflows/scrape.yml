name: scrape

# Runs the Shodan scraper on a schedule (and on demand), persists the updated
# SQLite DB to the db-store release, then rebuilds & deploys the site.
on:
  schedule:
    # Every 6 hours (UTC). Scraping spends Shodan query credits; the scraper
    # self-limits pages to the available credit balance.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: Number of Shodan result pages to fetch
        required: false
        default: '2'
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      - name: Scrape
        env:
          SHODANTOKEN: ${{ secrets.SHODANTOKEN }}
          PAGES: ${{ inputs.pages || '2' }}
        run: bun run scrape --pages "$PAGES"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Rebuild & deploy from the DB we just saved (build re-restores it from the store).
  call-build:
    needs: scrape
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
