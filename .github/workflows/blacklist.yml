name: blacklist

# Blacklists an IP or hostname (removes matching cameras from the DB + records
# it), persists the updated DB to the db-store release, then rebuilds & deploys
# the site.
on:
  workflow_dispatch:
    inputs:
      target:
        description: IP (IPv4/IPv6) or hostname/domain to blacklist
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  blacklist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # Target passed via env (not inline ${{ }}) to avoid shell injection.
      # The script validates the input and exits 1 on bad input.
      - name: Blacklist target
        env:
          TARGET: ${{ inputs.target }}
        run: bun run blacklist "$TARGET"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # Blacklisting removes cameras, so rebuild & deploy to drop them from the site.
  call-build:
    needs: blacklist
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
