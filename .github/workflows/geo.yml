name: geo

# Assigns manual coordinates to a YouTube stream in the yt_geo table (YouTube
# publishes none), persists the updated DB to the db-store release, then rebuilds
# & deploys the site so the stream appears on the map.
on:
  workflow_dispatch:
    inputs:
      video_id:
        description: YouTube video id (the stream to place)
        required: true
        type: string
      lat:
        description: Latitude (-90 to 90)
        required: true
        type: string
      lng:
        description: Longitude (-180 to 180)
        required: true
        type: string

# Serialize with every other DB-mutating workflow so runs can't clobber the DB.
concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  geo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload/create (persist the DB)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore DB from release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-store --pattern camhunting.sqlite --clobber || echo "no DB in store yet; starting fresh"

      # Inputs passed via env (not inline ${{ }}) to avoid shell injection.
      # The script validates the id and coordinate ranges and exits 1 on bad input.
      - name: Apply coordinate
        env:
          VIDEO_ID: ${{ inputs.video_id }}
          LAT: ${{ inputs.lat }}
          LNG: ${{ inputs.lng }}
        run: bun run geo "$VIDEO_ID" "$LAT" "$LNG"

      - name: Save DB to release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-store >/dev/null 2>&1 \
            || gh release create db-store --prerelease --title "SQLite store" --notes "camhunting.sqlite persistent store, do not delete"
          gh release upload db-store camhunting.sqlite --clobber

  # The stream's dot appears on the map, so rebuild & deploy to reflect it.
  call-build:
    needs: geo
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build.yml
